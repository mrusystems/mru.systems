    }

    :root {
      --ink: #16161a;
      --ink-soft: #44444c;
      --ink-faint: #6f6f78;
      --bg: #fafaf8;
      --rule: #e3e3dd;
      --accent: #3a4a5a;
      --glow: transparent;
      --maxw: 42rem; /* ~672px */
      --serif: "Charter", "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
      --display: "Futura", "Jost Mru", "Century Gothic", "Avenir Next", "Avenir", system-ui, sans-serif;
      --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #ecece8;
        --ink-soft: #c0c0bc;
        --ink-faint: #8f8f8a;
        --bg: #121214;
        --rule: #2a2a2e;
        --accent: #9fb4cb;
        --glow: rgba(120, 140, 170, 0.10);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 1.1875rem;
      line-height: 1.72;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Faint depth glow behind the wordmark. Pure CSS. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background-image: radial-gradient(ellipse 60% 45% at 50% 32%, var(--glow), transparent 70%);
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 7vw, 4rem) 1.5rem;
    }

    a { color: inherit; }

    /* Skip link */
    .skip {
      position: absolute;
      left: -9999px;
      top: 0;
      background: var(--ink);
      color: var(--bg);
      padding: .6rem 1rem;
      border-radius: 4px;
    }
    .skip:focus { left: 1rem; top: 1rem; z-index: 10; }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* Hero */
    .hero { text-align: center; margin-bottom: 2.5rem; }

    .maru {
      width: 78px;
      height: 78px;
      margin: 0 auto 1.75rem;
      display: block;
    }
    .maru .ring  { fill: none; stroke: var(--ink); stroke-width: 2.4; }
    .maru .orbit { fill: none; stroke: var(--ink); stroke-width: 1.4; }
    .maru .mk    { font-family: var(--display); font-weight: 500; font-size: 16px; fill: var(--ink); }

    .wordmark {
      font-family: var(--display);
      font-size: clamp(3.85rem, 13vw, 5rem);
      line-height: 1;
      font-weight: 500;
      letter-spacing: .005em;
      margin: 0;
    }

    .tagline {
      margin: clamp(1.25rem, 3.5vw, 1.85rem) auto 0;
      max-width: none;
      font-size: clamp(1.1rem, 2.8vw, 1.2rem);
      line-height: 1.45;
      color: var(--ink-soft);
      text-wrap: balance;
    }

    /* CTA */
    .cta-row {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .btn {
      display: inline-block;
      font-family: var(--serif);
      font-size: 1.0625rem;
      text-decoration: none;
      padding: .8rem 1.6rem;
      border: 1px solid var(--ink);
      border-radius: 999px;
      transition: background-color .15s ease, color .15s ease, transform .15s ease;
    }
    .btn-primary { background: var(--ink); color: var(--bg); }
    .btn-primary:hover { transform: translateY(-1px); opacity: .9; }
    .btn-primary:active { transform: translateY(0); }

    code, .mono { font-family: var(--mono); font-size: .92em; }

    /* Footer */
    footer {
      margin-top: 0;
      text-align: center;
      font-size: .9375rem;
      color: var(--ink-faint);
      line-height: 1.9;
    }
    footer a { color: var(--ink-soft); }
    footer .sep { opacity: .5; padding: 0 .35rem; }
    footer .footnote {
      margin: .55rem 0 0;
      font-size: .8125rem;
      opacity: .8;
    }

    /* Narrow screens: a larger mark, and the footer on its own lines. */
    @media (max-width: 32rem) {
      .maru { width: 92px; height: 92px; }
      footer > span { display: block; }
      footer .sep { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>

  <div class="wrap">
    <main id="main" class="hero">
      <svg class="maru" viewBox="0 0 100 100" role="img" aria-label="Mru">
        <circle class="ring" cx="50" cy="50" r="34"/>
        <ellipse class="orbit" cx="50" cy="50" rx="30" ry="14" transform="rotate(-22 50 50)"/>
        <text class="mk" x="50" y="55.6" text-anchor="middle">M</text>
      </svg>
      <h1 class="wordmark">Mru</h1>
      <p class="tagline">Software that still runs a thousand years after we&rsquo;re gone</p>
      <div class="cta-row">
        <a class="btn btn-primary" href="/mru-whitepaper.pdf">Paper</a>
      </div>
    </main>

    <footer>
      <span>&copy; 2026 Binns Pte. Ltd.</span>
      <span class="sep" aria-hidden="true">·</span>
      <span><a href="mailto:contact@mru.systems">contact@mru.systems</a></span>
      <p class="footnote">Paper <a href="https://creativecommons.org/licenses/by/4.0/" rel="license noopener">CC BY 4.0</a> &middot; Code <a href="https://www.apache.org/licenses/LICENSE-2.0" rel="license noopener">Apache 2.0</a></p>
      <p class="footnote">Mru&trade; and the Mru logo are our trademarks.</p>
    </footer>
  </div>
